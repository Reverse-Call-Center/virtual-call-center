syntax = "proto3";

option csharp_namespace = "virtual_call_center.Protos";

package callcenter;

service AgentService {
  rpc RegisterAgent(AgentRegistration) returns (AgentResponse);
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SendAudio(AudioFrame) returns (AudioResponse);
  rpc ReceiveAudio(ReceiveAudioRequest) returns (stream AudioFrame);
  rpc AcceptCall(AcceptCallRequest) returns (AcceptCallResponse);
  rpc EndCall(EndCallRequest) returns (EndCallResponse);
}

message AgentRegistration {
  int32 agent_id = 1;
  string agent_name = 2;
  int32 max_concurrent_calls = 3;
}

message AgentResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  int32 agent_id = 1;
  bool is_available = 2;
}

message HeartbeatResponse {
  bool success = 1;
  repeated CallAssignment pending_calls = 2;
}

message AudioFrame {
  string call_id = 1;
  int32 agent_id = 2;
  bytes pcm_data = 3;
  int64 timestamp = 4;
  int32 sequence_number = 5;
}

message AudioResponse {
  bool success = 1;
}

message ReceiveAudioRequest {
  string call_id = 1;
  int32 agent_id = 2;
}

message AcceptCallRequest {
  int32 agent_id = 1;
  string call_id = 2;
}

message AcceptCallResponse {
  bool success = 1;
  string message = 2;
}

message EndCallRequest {
  int32 agent_id = 1;
  string call_id = 2;
  string reason = 3;
}

message EndCallResponse {
  bool success = 1;
}

message CallAssignment {
  string call_id = 1;
  string caller_number = 2;
  int64 queue_time = 3;
}
